General:
  ProjectLocation: ENV['PLATO_PROJECT_HOME']
ObservingParameters:
  NumExposures: 2
  BeginExposureNr: 5
  CycleTime: 10.0
  StarCatalogFile: inputfiles/starcatalog.txt
Sky:
  SkyBackground:
    UseConstantSkyBackground: true
    BackgroundValue: 2.0
Platform:
  UseJitter: true
  JitterSource: FromRedNoise
  Orientation:
    Source: Angles
Telescope:
  GroupID: Custom
  UseDrift: false
Camera:
  PlateScale: 0.8333
  IncludeFieldDistortion: true
PSF:
  Model: AnalyticNonGaussian
FEE:
  Temperature: Nominal
CCD:
  Position: Custom
  NumRows: 4510
  NumColumns: 4510
SubField:
  NumRows: 4
  NumColumns: 3
RandomSeeds:
  ReadOutNoiseSeed: 1
ControlHDF5Content:
  WritePixelMaps: true
